<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div id="main">
            <div id="uper-half">
                <h2 id="main-heading">Metric/Imperial Unit Conversion</h2>
                <div id="input-border">
                    <input type="number" id="input" placeholder="00">
                </div>
                <button id="btn">Convert</button>
            </div>
            <div class="output">
                <h3>Length (Meter/Feet)</h3>
                <p id="meterFeet"></p>
            </div>
            <div class="output">
                <h3>Volume (Liters/Gallons)</h3>
                <p id="literGallon"></p>
            </div>
            <div class="output">
                <h3>Mass (Kilograms/Pounds)</h3>
                <p id="kgPound"></p>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
